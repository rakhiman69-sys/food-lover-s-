<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MK Restaurant</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff416c">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{background:#f8f9fa;}

header{
background:linear-gradient(135deg,#ff4b2b,#ff416c);
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:700;
position:sticky;
top:0;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
overflow:hidden;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:12px;
text-align:center;
}

button{
background:#ff416c;
color:white;
border:none;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
margin-top:6px;
}

.admin-panel{
background:#222;
color:white;
padding:15px;
display:none;
}

input{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

.install-btn{
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
color:white;
padding:12px 18px;
border-radius:50px;
display:none;
}

</style>
</head>

<body>

<header>🍔 MK Restaurant</header>

<div class="container" id="menu"></div>

<button onclick="toggleAdmin()" style="position:fixed;top:10px;right:10px;">Admin</button>

<div class="admin-panel" id="adminPanel">
<h3>Admin Panel</h3>

<input type="text" id="itemName" placeholder="Item Name">
<input type="number" id="itemPrice" placeholder="Price">
<input type="text" id="itemImage" placeholder="Image URL">

<button onclick="addItem()">Add Item</button>
<button onclick="logout()">Close</button>
</div>

<button class="install-btn" id="installBtn">Install App</button>

<script>
let menuData = JSON.parse(localStorage.getItem("menu")) || [
{name:"Burger",price:120,image:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd"},
{name:"Pizza",price:250,image:"https://images.unsplash.com/photo-1604908177522-4023d3c3e6ed"}
];

function renderMenu(){
let menu=document.getElementById("menu");
menu.innerHTML="";
menuData.forEach((item,i)=>{
menu.innerHTML+=`
<div class="card">
<img src="${item.image}">
<div class="card-content">
<h3>${item.name}</h3>
<p>₹${item.price}</p>
</div>
</div>`;
});
localStorage.setItem("menu",JSON.stringify(menuData));
}
renderMenu();

function toggleAdmin(){
let pass=prompt("Enter Admin Password:");
if(pass==="1234"){
document.getElementById("adminPanel").style.display="block";
}
}

function logout(){
document.getElementById("adminPanel").style.display="none";
}

function addItem(){
let name=document.getElementById("itemName").value;
let price=document.getElementById("itemPrice").value;
let image=document.getElementById("itemImage").value;

if(name && price && image){
menuData.push({name:name,price:price,image:image});
renderMenu();
alert("Item Added");
}
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
e.preventDefault();
deferredPrompt = e;
document.getElementById("installBtn").style.display = "block";
});

document.getElementById("installBtn").addEventListener("click", async () => {
if (deferredPrompt) {
deferredPrompt.prompt();
}
});
</script>

</body>
</html><script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js")
      .then(reg => console.log("Service Worker Registered"))
      .catch(err => console.log("SW Failed", err));
  });
}
</script>
